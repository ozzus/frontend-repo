<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Partner Widget</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="/assets/frame-page.js" defer></script>
  </head>
  <body data-page-id="partner-widget" data-suite="xfo" class="frame-shell">
    <main class="frame-panel partner">
      <p class="eyebrow">X-Frame-Options: ALLOW-FROM</p>
      <h1>Partner Conversion Widget</h1>
      <p class="lede">
        Исторический сценарий точечного доверия. В локальном стенде доверенный origin:
        <code data-xfo-allow-from-origin></code>.
      </p>
      <div class="meta-grid">
        <section class="meta-item">
          <span class="meta-label">Production partner</span>
          <span class="meta-value" data-production-partner-origin></span>
        </section>
        <section class="meta-item">
          <span class="meta-label">Маршрут</span>
          <span class="meta-value" data-current-path></span>
        </section>
        <section class="meta-item">
          <span class="meta-label">Origin</span>
          <span class="meta-value" data-current-origin></span>
        </section>
        <section class="meta-item">
          <span class="meta-label">Offer</span>
          <span class="meta-value">Partner-only bonus 12%</span>
        </section>
      </div>
      <p class="footer-note">
        На практике <code>ALLOW-FROM</code> устарел и не подходит как основной механизм защиты.
      </p>
    </main>
  </body>
</html>
